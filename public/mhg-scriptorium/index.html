<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Scriptorium</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loading-overlay">
    <div id="loading-box">
      <div id="loading-title">THE SCRIPTORIUM AWAKENS</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      <div id="loading-text">Preparing the oracle...</div>
    </div>
  </div>

  <header>
    <h1>The Scriptorium</h1>
    <div class="subtitle">A Middle High German Oracle</div>
    <div id="status">Awaiting ink...</div>
  </header>

  <main id="layout">
    <aside id="chronicle-panel" class="panel">
      <div class="panel-title">📖 Chronicle</div>
      <div id="chronicle-list"></div>
    </aside>

    <section id="scriptorium">
      <div id="ghost-layer" aria-hidden="true"></div>
      <div id="chat"></div>
    </section>

    <aside id="settings-panel" class="panel">
      <div class="panel-title">🗝️ Sacristy</div>
      <div class="setting-label">Triptych Persona</div>
      <div id="triptych">
        <button class="persona active" data-persona="knight">The Knight</button>
        <button class="persona" data-persona="mystic">The Mystic</button>
        <button class="persona" data-persona="fool">The Fool</button>
      </div>
      <div class="setting-label">Humors & Stars</div>
      <div id="humor-meter"><span id="humor-bar"></span></div>
      <div id="stars-note"></div>
    </aside>
  </main>

  <footer id="desk">
    <div id="control-row">
      <button id="chronicle-btn" title="Open Chronicle">📖</button>
      <button id="key-btn" title="Open Sacristy">🗝️</button>
      <button id="torch-btn" title="Burn Parchment">🔥</button>
    </div>

    <label for="scribe-input">Draft in Mittelhochdeutsch</label>
    <div id="input-wrap">
      <textarea id="scribe-input" placeholder="Sprechet..."></textarea>
      <div id="quill-cursor">🪶<span id="ink-drop"></span></div>
    </div>

    <div id="seal-row">
      <button id="wax-pot">1) Melt Wax</button>
      <div id="seal-target">
        <div id="wax-blob"></div>
        <div id="seal-help">2) Drag signet ring onto wax</div>
      </div>
      <div id="signet-ring" draggable="true" title="Drag to stamp">💍</div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
