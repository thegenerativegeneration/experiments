# QLoRA / SFT fine-tuning configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Base model ────────────────────────────────────────────────────────────────
# Any HuggingFace model ID or local path.
# Good multilingual 1.6B–5B starting points (all WebLLM-compatible):
#   Qwen/Qwen2.5-3B-Instruct      ← default; strong German, ~3B params
#   Qwen/Qwen2.5-1.5B-Instruct    ← lightest option; still decent German
#   meta-llama/Llama-3.2-3B-Instruct
#   microsoft/Phi-3.5-mini-instruct (~3.8B)
#   google/gemma-2-2b-it
model_name_or_path: Qwen/Qwen2.5-3B-Instruct

# ── Data ──────────────────────────────────────────────────────────────────────
train_file: data/train.jsonl
eval_file:  data/eval.jsonl
# Column that contains the list of chat messages.
messages_column: messages

# ── Output ────────────────────────────────────────────────────────────────────
output_dir: output/mhg-qwen2.5-3b

# ── Quantisation (QLoRA) ──────────────────────────────────────────────────────
load_in_4bit: true
bnb_4bit_compute_dtype: bfloat16  # float16 if bfloat16 not supported
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true

# ── LoRA adapter ──────────────────────────────────────────────────────────────
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
# Modules to attach LoRA adapters to.
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
bias: none
task_type: CAUSAL_LM

# ── Training hyperparameters ──────────────────────────────────────────────────
num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8   # effective batch = 32
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_seq_length: 2048
packing: false                     # pack short examples to fill context window

# ── Optimisation ─────────────────────────────────────────────────────────────
optim: paged_adamw_32bit
fp16: false
bf16: true                        # set to false and fp16: true for older GPUs
gradient_checkpointing: true

# ── Checkpointing & logging ───────────────────────────────────────────────────
save_steps: 100
eval_steps: 100
logging_steps: 25
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss

# ── Reproducibility ───────────────────────────────────────────────────────────
seed: 42

# ── Push to Hub ───────────────────────────────────────────────────────────────
# Set push_to_hub: true and fill hub_model_id to publish after training.
push_to_hub: false
hub_model_id: ""          # e.g. "your-org/mhg-mistral-7b"
